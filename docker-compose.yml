services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syntess-backend
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
    env_file:
      - ./backend/.env
    # Backend needs host networking to reach Firebird on the same VM
    # If Firebird is on the same host, use host network mode:
    # network_mode: host
    # Or set FB_HOST to the Docker host IP (usually 172.17.0.1)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - backend-logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: syntess-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      backend:
        condition: service_healthy

volumes:
  backend-logs:
