services:
  - type: web
    name: syntess-rapport-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MOCK_MODE
        value: "true"
      - key: LOG_LEVEL
        value: info
      - key: PORT
        value: "10000"
      - key: HOST
        value: "0.0.0.0"
      - key: CORS_ORIGINS
        value: "*"
      - key: JWT_SECRET
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        generateValue: true
